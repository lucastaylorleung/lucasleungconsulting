<section id="contact" class="py-20 bg-stone-50">
    <div class="max-w-xl mx-auto px-6">
        <div class="text-center mb-10">
            <h2 class="text-3xl font-bold mb-4">Let's Talk Growth</h2>
            <p class="text-slate-600">I help a limited number of SMBs per quarter to ensure deep, focused attention.</p>
        </div>
        
        <div class="bg-white p-8 rounded-2xl shadow-sm border border-stone-200">
            <form action="https://formspree.io/f/mvzvvbrw" method="POST" class="space-y-4">
                <div>
                    <label class="block text-xs font-bold uppercase tracking-widest text-slate-400 mb-2">Name</label>
                    <input type="text" name="name" required class="w-full px-4 py-3 rounded-lg border border-stone-200 focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 outline-none transition">
                </div>

                <div>
                    <label class="block text-xs font-bold uppercase tracking-widest text-slate-400 mb-2">Email</label>
                    <input type="email" name="email" required class="w-full px-4 py-3 rounded-lg border border-stone-200 focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 outline-none transition">
                </div>

                <div>
                    <label class="block text-xs font-bold uppercase tracking-widest text-slate-400 mb-2">Business Website</label>
                    <input type="url" name="website" placeholder="https://example.com" class="w-full px-4 py-3 rounded-lg border border-stone-200 focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 outline-none transition">
                </div>

                <div>
                    <label class="block text-xs font-bold uppercase tracking-widest text-slate-400 mb-2">Business Size</label>
                    <select name="business_size" required class="w-full px-4 py-3 rounded-lg border border-stone-200 focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 bg-white outline-none transition">
                        <option value="" disabled selected>Select number of employees</option>
                        <option value="1-5">1-5 employees</option>
                        <option value="6-20">6-20 employees</option>
                        <option value="21-50">21-50 employees</option>
                        <option value="50+">50+ employees</option>
                    </select>
                </div>

                <div>
                    <label class="block text-xs font-bold uppercase tracking-widest text-slate-400 mb-2">How can I help?</label>
                    <textarea name="message" rows="4" required placeholder="Tell me about your growth goals..." class="w-full px-4 py-3 rounded-lg border border-stone-200 focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 outline-none transition"></textarea>
                </div>

                <button type="submit" class="w-full py-4 bg-emerald-600 text-white rounded-xl font-bold hover:bg-emerald-700 transition shadow-lg shadow-emerald-200">
                    Send Message
                </button>
            </form>

            <div class="mt-8 pt-8 border-t border-stone-100 text-center">
                <p class="font-medium text-slate-800 mb-2">Or find me on</p>
                <div class="flex justify-center gap-6">
                    <a href="https://linkedin.com/in/lucasmarkleung" target="_blank" class="text-slate-400 hover:text-emerald-600 transition text-2xl" title="LinkedIn">
                        <i class="fab fa-linkedin"></i>
                    </a>
                    <a href="https://lucastaylorleung.substack.com/" target="_blank" class="text-slate-400 hover:text-emerald-600 transition text-2xl" title="Substack Newsletter">
                        <i class="fas fa-envelope-open-text"></i>
                    </a>
                </div>
            </div>
        </div>
    </div>
</section>
